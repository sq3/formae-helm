apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "formae.fullname" . }}
  labels:
    {{- include "formae.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "formae.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "formae.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "formae.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "formae.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - formae
            - agent
            - start
            - --config
            - /config/formae.conf.pkl
          ports:
            - name: http
              containerPort: {{ .Values.formae.server.port }}
              protocol: TCP
          env:
            {{- if not .Values.formae.existingConfig }}
            {{- if eq .Values.formae.datastore.type "postgres" }}
            - name: FORMAE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "formae.postgres.secretName" . }}
                  key: {{ include "formae.postgres.secretKey" . }}
            {{- end }}
            {{- if .Values.formae.auth.enabled }}
            - name: FORMAE_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "formae.auth.secretName" . }}
                  key: {{ .Values.formae.auth.basic.usernameKey }}
            - name: FORMAE_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "formae.auth.secretName" . }}
                  key: {{ .Values.formae.auth.basic.passwordKey }}
            {{- end }}
            {{- end }}
            {{- if .Values.formae.otel.enabled }}
            - name: FORMAE_OTEL_ENABLED
              value: "true"
            {{- if .Values.otelCollector.enabled }}
            - name: FORMAE_OTEL_ENDPOINT
              value: "localhost:4317"
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if and .Values.formae.auth.enabled (not .Values.formae.existingConfig) }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- else }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if eq .Values.formae.datastore.type "sqlite" }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.formae.server.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if .Values.otelCollector.enabled }}
        - name: otel-collector
          image: "{{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}"
          imagePullPolicy: {{ .Values.otelCollector.image.pullPolicy }}
          args:
            - --config=/etc/otel/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            {{- toYaml .Values.otelCollector.resources | nindent 12 }}
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
              readOnly: true
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "formae.fullname" . }}-config
        {{- if eq .Values.formae.datastore.type "sqlite" }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "formae.fullname" .)) .Values.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.formae.server.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.formae.server.tls.certSecret }}
        {{- end }}
        {{- if .Values.otelCollector.enabled }}
        - name: otel-config
          configMap:
            name: {{ include "formae.fullname" . }}-otel-collector
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
